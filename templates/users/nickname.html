{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/users.css' %}">
{% endblock %}

{% block extra_script %}
    <script src="{% static 'js/users.js' %}"></script>
{% endblock %}

{% block content %}
<div class="scroll-container">
    <div class="container-mw">
        
        <div class="logo-area" style="margin-bottom: 40px; text-align: center;">
            <img src="{% static 'images/logo.png' %}" alt="Recipick" style="width: 280px; height: auto;" onerror="this.src='https://via.placeholder.com/175x37'">
        </div>

        <form id="nickname-form" class="form-group-mw">
            <div class="form-group-mw">
                <input type="text" id="nickname" placeholder="닉네임 설정" class="input-mw" required>
            </div>
            <button type="submit" class="btn-mw btn-primary-mw" style="margin-top: 20px;">완료</button>
        </form>

    </div>
</div>
{% endblock %}
