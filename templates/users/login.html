{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/users.css' %}">
{% endblock %}

{% block content %}
<div class="container-mw">
    
    <div class="logo-area">
        <h1 class="title-text">Recipick</h1>
    </div>

    <form id="login-form" class="signup-form-area" style="padding-top: 344px;"> 
        <div class="form-group-mw">
            <input type="email" id="email" placeholder="이메일" class="input-mw" required>
        </div>
        <div class="form-group-mw">
            <input type="password" id="password" placeholder="비밀번호" class="input-mw" required>
        </div>
        
        <button type="submit" class="btn-mw btn-primary-mw" style="margin-top: 25px;">로그인</button>
    </form>

    <a href="{% url 'users:signup' %}" class="link-text-mw" style="margin-top: 8px;">
        회원가입
    </a>

    <div class="social-container-mw">
        <button type="button" class="btn-mw btn-social-mw google-mw">
            <img src="{% static 'images/icon_google.png' %}" class="social-icon" alt="G">
            구글로 로그인
        </button>
        
        <button type="button" class="btn-mw btn-social-mw naver-mw">
            <img src="{% static 'images/icon_naver.png' %}" class="social-icon" alt="N">
            네이버로 로그인
        </button>
        
        <button type="button" class="btn-mw btn-social-mw kakao-mw">
            <img src="{% static 'images/icon_kakao.png' %}" class="social-icon" alt="K">
            카카오로 로그인
        </button>
    </div>

    <a href="{% url 'users:main' %}" class="btn-guest-mw">
        비회원으로 사용하기
    </a>
</div>

<script>
    // 1. 쿠키에서 CSRF 토큰을 가져오는 함수 (장고 공식 가이드 방식)
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // 2. 쿠키에서 csrftoken 값을 가져옴
        const csrftoken = getCookie('csrftoken');

        try {
            const response = await fetch('/api/users/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // 3. 올바른 토큰값을 헤더에 실어 보냄
                    'X-CSRFToken': csrftoken
                },
                mode: 'same-origin', // 보안을 위해 추가
                body: JSON.stringify({
                    login_type: 'email',
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('access_token', data.token.access);
                localStorage.setItem('refresh_token', data.token.refresh);
                localStorage.setItem('user_nickname', data.user.nickname);
                window.location.href = "{% url 'users:main' %}";
            } else {
                alert(data.message || '로그인 실패');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('서버 통신 중 오류가 발생했습니다.');
        }
    });
</script>
{% endblock %}
