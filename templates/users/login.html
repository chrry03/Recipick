{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/users.css' %}">
{% endblock %}

{% block content %}
<div class="container-mw">
    <h1 class="title-mw">Recipick</h1>

    <form id="login-form" class="form-group-mw">
        <div class="form-group-mw">
            <input type="email" id="email" placeholder="이메일을 입력해주세요" class="input-mw" required>
        </div>
        <div class="form-group-mw">
            <input type="password" id="password" placeholder="비밀번호를 입력해주세요" class="input-mw" required>
        </div>
        <button type="submit" class="btn-mw btn-primary-mw">로그인</button>
    </form>

    <a href="{% url 'users:signup' %}" class="link-text-mw">아직 회원이 아니신가요? <strong>회원가입</strong></a>

    <div class="social-container-mw">
        <button type="button" class="btn-mw btn-social-mw kakao-mw" onclick="alert('카카오 로그인 연동 필요')">카카오로 시작하기</button>
        <button type="button" class="btn-mw btn-social-mw naver-mw" onclick="alert('네이버 로그인 연동 필요')">네이버로 시작하기</button>
        <button type="button" class="btn-mw btn-social-mw google-mw" onclick="alert('구글 로그인 연동 필요')">Google로 시작하기</button>
    </div>

    <a href="{% url 'users:main' %}" class="btn-mw btn-guest-mw" style="text-align:center; text-decoration:none;">
        비회원으로 둘러보기
    </a>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault(); // 폼 기본 제출 막기

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/users/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    login_type: 'email',
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok) {
                // 로그인 성공: 토큰 저장
                localStorage.setItem('access_token', data.token.access);
                localStorage.setItem('refresh_token', data.token.refresh);
                localStorage.setItem('user_nickname', data.user.nickname); // 편의상 저장

                alert('로그인 성공!');
                window.location.href = "{% url 'users:main' %}"; // 메인으로 이동
            } else {
                // 로그인 실패
                alert(data.message || '이메일 또는 비밀번호를 확인해주세요.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('서버 통신 중 오류가 발생했습니다.');
        }
    });
</script>
{% endblock %}
