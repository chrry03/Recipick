{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/users.css' %}">
{% endblock %}

{% block content %}
<div class="container-mw">
    
    <div class="logo-area">
        <h1 class="title-text">Recipick</h1>
    </div>

    <form id="signup-step1-form" class="signup-form-area">
        
        <input type="email" id="email" placeholder="이메일" class="input-mw" required>
        
        <input type="password" id="password" placeholder="비밀번호" class="input-mw" required>

        <input type="password" id="password_confirm" placeholder="비밀번호 확인" class="input-mw" required>

        <button type="submit" class="btn-mw btn-primary-mw" style="margin-top: 16px;">
            회원가입
        </button>
    </form>
</div>

<script>
    document.getElementById('signup-step1-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('password_confirm').value;

        if (password !== passwordConfirm) {
            alert('비밀번호가 일치하지 않습니다.');
            return;
        }

        // 임시 저장 후 닉네임 설정 페이지로 이동
        localStorage.setItem('temp_email', email);
        localStorage.setItem('temp_pw', password);
        window.location.href = "{% url 'users:nickname' %}?next=preference";
    });
</script>
{% endblock %}
