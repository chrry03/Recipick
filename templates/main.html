{% extends 'base.html' %}
{% load static %}

{% block title %}홈 - Recipick{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
{% endblock %}

{% block content %}
<div class="app-container">
    <!-- Header -->
    <header class="header">
        <!-- 알림 아이콘 -->
        <a href="{% url 'users:notification' %}" class="notification-btn" aria-label="알림">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
                <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
            </svg>
        </a>
        
        <!-- 로고  -->
        <div class="header-content">
            <img src="{% static 'images/logo.png' %}" alt="Recipick" class="logo" onerror="this.src='https://via.placeholder.com/175x37'">
        </div>
        
        <!-- 검색창 -->
        <div class="search-container">
            <div class="search-bar">
                <img src="{% static 'images/search.png' %}" class="search-icon" alt="검색" onerror="console.error('검색 아이콘 로드 실패:', this.src)">
                <input type="text" placeholder="레시피 검색" class="search-input" id="searchInput">
            </div>
        </div>
    </header>




    <!-- Recommended Recipe Section -->
    <section class="section">
        <div class="section-header">
            <h2 class="section-title">오늘의 추천 메뉴</h2>
            <button class="view-all-btn" onclick="window.location.href='#'">전체보기</button>
        </div>
        
        <div class="carousel-wrapper">
            <div class="carousel" id="recipeCarousel">
                <!-- Carousel items will be inserted by JavaScript -->
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
        </div>
        
        <!-- 레시피 데이터 (서버에서 전달) -->
        <script type="application/json" id="recipeData">{{ recommended_recipes|safe }}</script>
    </section>

    <!-- Favorite Recipes Section -->
    <section class="section">
        <div class="section-header">
            <svg class="section-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#ff7043" stroke="#ff7043" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
            </svg>
            <h2 class="section-title">찜한 레시피</h2>
            <button class="view-all-btn" onclick="window.location.href='#'">전체보기</button>
        </div>
        
        <div class="recipe-list" id="favoriteRecipes" data-recipes='{{ favorite_recipes|safe }}'>
            <!-- Recipe cards will be inserted by JavaScript -->
        </div>
    </section>

    <!-- Ingredients Section -->
    <section class="section">
        <div class="section-header">
            <img src="{% static 'images/main_ingredient.svg' %}" class="section-icon" alt="내 식재료">
            <h2 class="section-title">내 식재료</h2>
            <button class="view-all-btn" onclick="window.location.href='#'">전체보기</button>
        </div>
        
        <div class="ingredients-container">
            <div class="ingredients-grid" id="ingredientsGrid" data-ingredients='{{ ingredients|safe }}'>
                <!-- Ingredient buttons will be inserted by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Diary Section -->
    <section class="section">
        <div class="section-header">
            <img src="{% static 'images/main_log.svg' %}" class="section-icon" alt="내 일지">
            <h2 class="section-title">내 일지</h2>
            <button class="view-all-btn" onclick="window.location.href='#'">전체보기</button>
        </div>
        
        <div class="diary-slider-wrapper">
            <button class="diary-nav left" id="diaryPrev" style="display: none;" aria-label="이전 일지">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6"></path>
                </svg>
            </button>
            <button class="diary-nav right" id="diaryNext" aria-label="다음 일지">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6"></path>
                </svg>
            </button>
            <div class="diary-slider" id="diarySlider" data-entries='{{ diary_entries|safe }}'>
                <!-- Diary cards will be inserted by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Floating Add Button -->
    <button class="floating-add-btn" id="addRecipeBtn" aria-label="레시피 추가">
        <img src="{% static 'images/ingredient_plus.svg' %}" alt="추가" width="32" height="32">
    </button>

    <!-- Bottom Navigation -->
    {% include 'base_with_navbar.html' %}
</div>
{% endblock %}

{% block extra_script %}
<script src="{% static 'js/main.js' %}"></script>
{% endblock %}
