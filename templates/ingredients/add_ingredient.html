<!-- 식재료 검색 및 추가 화면 -->
{% extends 'base_with_navbar.html' %}
{% load static %}

{% block header %}
<header class="page-header">
    <div class="logo-area">
        <span class="logo-text">🥄 Recipick</span>
    </div>
    <div class="header-icons">
        <button class="icon-btn">🔍</button>
        <button class="icon-btn">🔔</button>
    </div>
</header>
<div class="search-bar-container">
    <div class="search-input-box">
        <span class="search-icon-inside">🔍</span>
        <input type="text" placeholder="식재료 검색">
    </div>
</div>
{% endblock header %}

{% block main_content %}
<style>
    /* 카테고리 필터 (가로 스크롤) */
    .filter-scroll-area {
        overflow-x: auto;
        white-space: nowrap;
        padding: 10px 20px;
        background-color: var(--color-bg);
        scrollbar-width: none; /* 파이어폭스 스크롤 숨김 */
    }
    .filter-scroll-area::-webkit-scrollbar { display: none; } /* 크롬 스크롤 숨김 */

    .filter-chip {
        display: inline-block;
        padding: 8px 16px;
        margin-right: 8px;
        border-radius: 20px;
        background-color: #E0E0E0;
        color: #555;
        font-size: 13px;
        border: none;
        cursor: pointer;
    }
    .filter-chip.active {
        background-color: var(--color-primary);
        color: white;
    }

    /* 재료 그리드 */
    .selection-grid {
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }
    
    /* 선택 아이템 스타일 (my_fridge와 유사하지만 클릭 가능) */
    .select-item {
        width: calc(33.33% - 10px);
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        position: relative;
    }
    .select-img-circle {
        width: 70px; height: 70px;
        background-color: #fff;
        border-radius: 50%;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* 그림자 추가 */
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
        transition: transform 0.2s;
    }
    /* 선택되었을 때 효과 (옵션) */
    .select-item.selected .select-img-circle {
        border: 3px solid var(--color-primary);
        transform: scale(1.05);
    }
    .select-item.selected .ing-name {
        color: var(--color-primary);
        font-weight: bold;
    }
    
    .ing-name { font-size: 14px; color: #333; }
</style>

<div class="filter-scroll-area">
    <button class="filter-chip active">전체(xx)</button>
    <button class="filter-chip">채소류(xx)</button>
    <button class="filter-chip">어패류(xx)</button>
    <button class="filter-chip">양념(xx)</button>
    <button class="filter-chip">육류(xx)</button>
</div>

<div class="selection-grid">
    <div class="select-item" onclick="toggleSelect(this)">
        <div class="select-img-circle"><img src="{% static 'images/carrot.png' %}" width="40"></div>
        <span class="ing-name">당근</span>
    </div>
    <div class="select-item" onclick="toggleSelect(this)">
        <div class="select-img-circle"><img src="{% static 'images/meat.png' %}" width="40"></div>
        <span class="ing-name">소고기</span>
    </div>
    <div class="select-item" onclick="toggleSelect(this)">
        <div class="select-img-circle"><img src="{% static 'images/broccoli.png' %}" width="40"></div>
        <span class="ing-name">브로콜리</span>
    </div>
    </div>

<script>
    // 간단한 선택 토글 스크립트
    function toggleSelect(element) {
        element.classList.toggle('selected');
        // 추후 선택된 재료들을 모아 submit 하는 로직 필요
    }
</script>
{% endblock main_content %}
