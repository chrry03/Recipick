{% extends "base.html" %}

{% block content %}
<header class="page-header">
    <button class="back-btn"><i class="fas fa-chevron-left"></i></button>
    <div class="logo-text">Recipick</div>
    <div class="header-icons">
        <button class="icon-btn"><i class="fas fa-search"></i></button>
        <button class="icon-btn"><i class="far fa-bell"></i></button>
    </div>
</header>

<nav class="category-scroll-nav">
    <button class="cat-tab active">전체(24)</button>
    <button class="cat-tab">채소류(12)</button>
    <button class="cat-tab">어패류(5)</button>
    <button class="cat-tab">양념(7)</button>
</nav>

<div class="ingredient-selection-panel">
    <div class="selection-grid">
        {% for master in master_ingredients %}
        <div class="master-item {% if master.is_selected %}selected{% endif %}">
            <div class="img-box">
                <img src="{{ master.icon }}" alt="{{ master.name_ko }}">
                {% if master.is_added %}
                <span class="badge-added">추가됨</span>
                {% endif %}
            </div>
            <p>{{ master.name_ko }}</p>
        </div>
        {% endfor %}
    </div>
</div>

<footer class="selection-footer">
    <button class="btn-primary-large">선택 완료 (3)</button>
</footer>
{% endblock %}
