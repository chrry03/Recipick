{% extends 'base_with_navbar.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/my_fridge.css' %}">
{% endblock %}

{% block header %}
{% include 'header.html' %}
{% endblock header %}

{% block main_content %}
<div class="fridge-container">
    
    <div class="fridge-fixed-top">
        <div class="fridge-search-wrapper">
            <div class="search-input-container">
                <input type="text" placeholder="식재료 검색" class="fridge-search-input" id="searchInput">
                <img src="{% static 'images/search.png' %}" class="search-icon" alt="검색" onerror="this.style.display='none'">
            </div>
            <button id="editModeBtn" class="edit-mode-btn">편집</button>
        </div>

        <div class="category-filter-bar" id="categoryFilter"></div>
    </div>

    <div class="fridge-scroll-area">
        <div class="fridge-inner-box" id="fridgeList">
            
            <div id="emptyState" style="text-align: center; padding-top: 100px; display: none;">
                <img src="{% static 'images/empty_fridge.png' %}" style="width: 60px; opacity: 0.5;">
                <p style="color: #999; font-size: 13px; margin-top: 15px; line-height: 1.5;">
                    냉장고가 비었어요!<br>
                    [+] 버튼을 눌러 채워보세요
                </p>
            </div>

            <div class="ingredient-shelf-list" id="shelfListContainer">
            </div>
        </div>
    </div>

    <a href="{% url 'ingredients:add_ingredient' %}" class="floating-add-btn" aria-label="재료 추가">
        <img src="{% static 'images/ingredient_plus.svg' %}" alt="추가">
    </a>

</div>

<div class="modal-overlay" id="editModal" style="display: none;">
    <div class="custom-modal date-modal">
        <h3 class="modal-title">
            <span id="modalIngredientName" class="highlight-text"></span> 수정
        </h3>
        <div class="date-input-wrapper">
            <input type="text" id="nameEditInput" class="date-picker" style="margin-bottom: 10px; display: none;" placeholder="이름 수정">
            <input type="date" id="expiryInput" class="date-picker">
        </div>
        <div class="modal-actions">
            <button type="button" class="btn-cancel" id="cancelBtn">취소</button>
            <button type="button" class="btn-confirm" id="confirmBtn">수정</button>
        </div>
    </div>
</div>
{% endblock main_content %}

{% block extra_script %}
<div id="csrf-token" style="display:none;" data-token="{{ csrf_token }}"></div>
<script src="{% static 'js/my_fridge.js' %}"></script>
{% endblock %}
