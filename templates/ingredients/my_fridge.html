{% extends 'base_with_navbar.html' %}
{% load static %}

{% block header %}
<div class="header-container">
    <img src="{% static 'images/logo.png' %}" alt="Recipick" class="logo-img">
    <img src="{% static 'images/bell.png' %}" alt="알림" class="bell-icon">
</div>
{% endblock header %}

{% block main_content %}
<style>
    /* --- 이 페이지 전용 스타일 --- */
    
    /* 1. 검색창 */
    .search-wrapper {
        position: relative;
        margin-top: 10px;
        margin-bottom: 24px;
        width: 100%;
    }
    
    .search-input {
        width: 100%;
        height: 40px;
        background: transparent;
        border: 1px solid #555555;
        border-radius: 20px;
        padding: 0 40px 0 16px; /* 오른쪽 아이콘 여백 */
        box-sizing: border-box;
        
        font-family: 'Gowun Dodum', sans-serif; /* 고운 돋음 적용 */
        font-size: 14px;
        color: #555555;
    }
    
    .search-input::placeholder {
        color: #555555;
        opacity: 0.7;
    }
    
    .search-icon-img {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        pointer-events: none;
    }

    /* 2. 식재료 등록 프로모션 카드 */
    .promo-card {
        background: #FFFFFF;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
        border-radius: 16px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        box-sizing: border-box;
        margin-bottom: 40px;
    }

    .card-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        
        font-family: 'Nanum Gothic', sans-serif;
        font-weight: 700; /* Bold */
        font-size: 18px;
        color: #1A1A1A;
    }

    .card-desc {
        font-family: 'Nanum Gothic', sans-serif;
        font-size: 13px;
        line-height: 1.5;
        color: #6B6B6B;
        margin-bottom: 20px;
    }

    /* 주황색 버튼 */
    .btn-orange {
        width: 100%;
        height: 48px;
        background: #FF7043; /* 컬러셋 주황색 */
        border-radius: 24px;
        border: none;
        
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        text-decoration: none;
        
        /* 그림자 효과 (선택사항) */
        box-shadow: 0 2px 4px rgba(255, 112, 67, 0.3);
    }

    .btn-orange span {
        font-family: 'Nanum Gothic', sans-serif;
        font-size: 16px;
        color: #FFEEDB; /* 버튼 텍스트 연한 살구색 */
        font-weight: 400;
    }

    /* 3. Empty State (거미줄) */
    .empty-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 40px;
        opacity: 0.8;
    }

    .empty-img {
        width: 120px;
        height: auto;
        margin-bottom: 16px;
    }

    .empty-text {
        font-family: 'Gowun Dodum', sans-serif; /* 고운 돋음 적용 */
        font-size: 12px;
        line-height: 1.5;
        text-align: center;
        color: #555555;
    }
</style>

<div class="search-wrapper">
    <input type="text" class="search-input" placeholder="식재료 검색">
    <img src="{% static 'images/search.png' %}" alt="검색" class="search-icon-img">
</div>

<div class="promo-card">
    <div class="card-title">
        <span>🔪</span> 
        <span>식재료 등록</span>
    </div>
    <div class="card-desc">
        냉장고에 있는 재료를 등록하고<br>
        맞춤 레시피를 추천받아보세요
    </div>
    
    <a href="{% url 'add_ingredient' %}" class="btn-orange">
        <span>+ 재료 추가하기</span>
    </a>
</div>

{% if not ingredients %}
    <div class="empty-area">
        <img src="{% static 'images/empty_fridge.png' %}" alt="텅 빈 냉장고" class="empty-img">
        <div class="empty-text">
            냉장고가 텅 비어있어요...<br>
            '재료 추가 버튼'을 눌러 추가해 주세요!
        </div>
    </div>
{% else %}
    <div class="ingredient-list">
        </div>
{% endif %}

{% endblock main_content %}
